providers:
  # 订阅类
  volcengine-coding-plan:
    protocols:
      - openai-chat-completions
      - anthropic
    base_urls:
      openai: https://ark.cn-beijing.volces.com/api/coding/v3
      anthropic: https://ark.cn-beijing.volces.com/api/coding
    key_command:
      - printenv
      - ARK_API_KEY
    default_model: ark-code-latest
    models:
      - ark-code-latest
      - doubao-seed-2.0-code
      - kimi-k2.5
      - glm-4.7
    disable_model_loading_from_api: true

  kimi-code:
    protocols:
      - openai-chat-completions
      - anthropic
    base_urls:
      openai: https://api.kimi.com/coding/v1
      anthropic: https://api.kimi.com/coding
    key_command:
      - printenv
      - KIMI_API_KEY
    anthropic_use_api_key: true
    default_model: kimi-for-coding
    models:
      - kimi-for-coding
    disable_model_loading_from_api: true

  minimax-token-plan:
    protocols:
      - openai-chat-completions
      - anthropic
    base_urls:
      openai: https://api.minimaxi.com/v1
      anthropic: https://api.minimaxi.com/anthropic
    key_command:
      - printenv
      - MINIMAX_API_KEY
    default_model: MiniMax-M2.7
    models:
      - MiniMax-M2.7
      - MiniMax-M2.7-highspeed
    disable_model_loading_from_api: true

  # 按量类
  deepseek:
    protocols:
      - openai-chat-completions
      - anthropic
    base_urls:
      openai: https://api.deepseek.com
      anthropic: https://api.deepseek.com/anthropic
    key_command:
      - printenv
      - DEEPSEEK_API_KEY
    default_model: deepseek-v4-pro
    models:
      - deepseek-v4-pro
      - deepseek-v4-flash
    disable_model_loading_from_api: true

  openrouter:
    protocols:
      - openai-chat-completions
      - openai-responses
      - anthropic
    base_urls:
      openai: https://openrouter.ai/api/v1
      anthropic: https://openrouter.ai/api
    key_command:
      - printenv
      - OPENROUTER_API_KEY
    default_model: anthropic/claude-sonnet-4.6
    models:
      - anthropic/claude-sonnet-4.6
      - anthropic/claude-opus-4.6
      - openai/gpt-5.3-codex
      - openai/gpt-5.4-mini
    disable_model_loading_from_api: true

  # 本地类
  ollama:
    protocols:
      - openai-chat-completions
      - openai-responses
    base_urls:
      openai: http://localhost:11434/v1
    key: ollama
    default_model: gpt-oss:20b
    models:
      - gpt-oss:20b
      - gpt-oss:120b
      - gpt-oss:120b-cloud
    disable_model_loading_from_api: false

  lmstudio:
    protocols:
      - openai-responses
      - anthropic
    base_urls:
      openai: http://localhost:1234/v1
      anthropic: http://localhost:1234
    key: lmstudio
    default_model: openai/gpt-oss-20b
    models:
      - openai/gpt-oss-20b
      - ibm/granite-4-micro
    disable_model_loading_from_api: false
