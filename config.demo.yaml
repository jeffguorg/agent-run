providers:
  kimi-for-coding:
    protocols:
      - openai-chat-completions
      - anthropic
    base_urls:
      openai: https://api.kimi.com/coding/v1
      anthropic: https://api.kimi.com/coding
    key_command: ["printenv", "KIMI_CODE_API_KEY"]
    ## or you can extract your key from password manager like this
    #key_command: ["keepassxc-cli", "show", "-a", "Password", "/path/to/Password.kdbx", "kimi-for-coding"]
    ## or specify your key directly
    #key: sk-*********
    anthropic_use_api_key: true
    default_model: kimi-for-coding
    models:
      - kimi-for-coding
    disable_model_loading_from_api: true

  # 按量类
  openrouter:
    protocols:
      - openai-chat-completions
      - openai-responses
      - anthropic
    base_urls:
      openai: https://openrouter.ai/api/v1
      anthropic: https://openrouter.ai/api
    key_command:
      - printenv
      - OPENROUTER_API_KEY
    default_model: anthropic/claude-sonnet-4.6
    models:
      - anthropic/claude-sonnet-4.6
      - anthropic/claude-opus-4.6
      - openai/gpt-5.3-codex
      - openai/gpt-5.4-mini
    disable_model_loading_from_api: true

  # 本地类
  # name 'ollama' is preserved by some coding agent internally, like codex
  #
  # if access to ollama on is needed and you need to configure it manually, use
  # names like ollama-localhost or other names other than ollama
  ollama-localhost:
    protocols:
      - openai-chat-completions
      - openai-responses
    base_urls:
      openai: http://localhost:11434/v1
    key: ollama
    default_model: gpt-oss:20b
    models:
      - gpt-oss:20b
      - gpt-oss:120b
      - gpt-oss:120b-cloud
    disable_model_loading_from_api: false

  # name 'lmstudio' is preserved by some coding agent internally, like codex
  #
  # if access to lmstudio on is needed and you need to configure it manually, use
  # names like lmstudio-localhost or other names other than lmstudio
  lmstudio-localhost:
    protocols:
      - openai-responses
      - openai-chat-completions
      - anthropic
    base_urls:
      openai: http://localhost:1234/v1
      anthropic: http://localhost:1234
    key: lmstudio
    default_model: openai/gpt-oss-20b
    models:
      - openai/gpt-oss-20b
      - ibm/granite-4-micro
    disable_model_loading_from_api: false
